<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stakeholder Update Generator</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 { font-size: 1.5rem; margin-bottom: 4px; }
      p.subtitle { color: #555; margin-top: 0; margin-bottom: 24px; }

      label { display: block; font-weight: bold; margin-bottom: 4px; }
      textarea {
        width: 100%;
        padding: 8px;
        font-size: 0.95rem;
        box-sizing: border-box;
        margin-bottom: 16px;
        resize: vertical;
      }

      button#submit-btn {
        padding: 10px 24px;
        font-size: 1rem;
        cursor: pointer;
      }
      button#submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #error-msg {
        color: red;
        margin-top: 12px;
        display: none;
      }

      #results { margin-top: 32px; display: none; }

      .result-block { margin-bottom: 28px; }
      .result-block h2 { font-size: 1rem; margin-bottom: 6px; }
      .result-block pre {
        background: #f4f4f4;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #ddd;
        font-size: 0.9rem;
      }
      .copy-btn {
        margin-top: 6px;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>

    <h1>Stakeholder Update Generator</h1>
    <p class="subtitle">Fill in the 3 fields and get a Slack message, email, and executive summary instantly.</p>

    <!-- INPUT FORM -->
    <label for="shipped">What Shipped</label>
    <textarea id="shipped" rows="3" placeholder="e.g. Launched onboarding redesign and fixed 3 critical bugs"></textarea>

    <label for="metrics">Metrics</label>
    <textarea id="metrics" rows="3" placeholder="e.g. Activation rate up 12%, support tickets down 20%"></textarea>

    <label for="risks">Risks & Blockers</label>
    <textarea id="risks" rows="3" placeholder="e.g. Payment integration delayed 1 week due to third-party API issues"></textarea>

    <button id="submit-btn">Generate Updates</button>
    <p id="error-msg"></p>

    <!-- OUTPUT SECTIONS -->
    <div id="results">
      <div class="result-block">
        <h2>💬 Slack Message</h2>
        <pre id="out-slack"></pre>
        <button class="copy-btn" data-target="out-slack">Copy</button>
      </div>

      <div class="result-block">
        <h2>📧 Email</h2>
        <pre id="out-email"></pre>
        <button class="copy-btn" data-target="out-email">Copy</button>
      </div>

      <div class="result-block">
        <h2>📊 Executive Summary</h2>
        <pre id="out-exec"></pre>
        <button class="copy-btn" data-target="out-exec">Copy</button>
      </div>
    </div>

    <script>
      const submitBtn  = document.getElementById('submit-btn');
      const errorMsg   = document.getElementById('error-msg');
      const resultsDiv = document.getElementById('results');

      // ── Submit ──────────────────────────────────────────────────────────
      submitBtn.addEventListener('click', async () => {
        const shipped = document.getElementById('shipped').value.trim();
        const metrics = document.getElementById('metrics').value.trim();
        const risks   = document.getElementById('risks').value.trim();

        // Reset UI state
        errorMsg.style.display = 'none';
        errorMsg.textContent   = '';
        resultsDiv.style.display = 'none';

        // Loading state
        submitBtn.disabled    = true;
        submitBtn.textContent = 'Generating…';

        try {
          const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ shipped, metrics, risks })
          });

          const data = await response.json();

          if (!response.ok) {
            showError(data.error || 'Something went wrong. Please try again.');
            return;
          }

          // Populate outputs
          document.getElementById('out-slack').textContent = data.slack;
          document.getElementById('out-email').textContent = data.email;
          document.getElementById('out-exec').textContent  = data.executive_summary;

          resultsDiv.style.display = 'block';

        } catch (err) {
          showError('Could not reach the server. Is it running?');
        } finally {
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Generate Updates';
        }
      });

      // ── Copy buttons ────────────────────────────────────────────────────
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.getAttribute('data-target');
          const text = document.getElementById(targetId).textContent;

          navigator.clipboard.writeText(text).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
          });
        });
      });

      // ── Helper ──────────────────────────────────────────────────────────
      function showError(msg) {
        errorMsg.textContent   = msg;
        errorMsg.style.display = 'block';
      }
    </script>

  </body>
</html>
